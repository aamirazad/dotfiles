# Kitty configuration migrated from Alacritty.

# Appearance
font_family                 MesloLGS Nerd Font Mono
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
font_size                   12.0
remember_window_size        no
initial_window_width        950
initial_window_height       500
background_opacity          0.9
dynamic_background_opacity  yes
background_blur             1
cursor_blink_interval       0.5
cursor_stop_blinking_after  1
confirm_os_window_close     0
enable_audio_bell           no

# Scrollback and mouse
scrollback_lines            5000
wheel_scroll_min_lines      1
url_style                   curly
open_url_with               default

# Nordic palette ported from alacritty/nordic.toml.
include nordic.conf

# Clipboard
map super+c                  copy_to_clipboard
map super+v                  paste_from_clipboard
map ctrl+shift+c             copy_to_clipboard
map ctrl+shift+v             paste_from_clipboard
map ctrl+shift+s             paste_from_clipboard
map shift+insert             paste_from_selection
map ctrl+v                   paste_from_clipboard

# Scrollback navigation
map ctrl+shift+k             scroll_line_up
map ctrl+shift+j             scroll_line_down
map ctrl+shift+page_up       scroll_page_up
map ctrl+shift+page_down     scroll_page_down
map ctrl+shift+home          scroll_home
map ctrl+shift+end           scroll_end

# Plain Kitty starts normally. This opt-in shortcut opens a separate OS window
# using the same detached-session reuse behavior as the old Alacritty setup.
map ctrl+shift+m             launch --type=os-window --cwd=current ~/.config/kitty/tmux-session

# Keep Kitty's native tabs available in non-tmux windows.
map ctrl+shift+t             new_tab_with_cwd

# Optional machine-local overrides.
globinclude ./local-*.conf
